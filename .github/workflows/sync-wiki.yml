name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/wiki/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clone Wiki Repository
        env:
          # We use the built-in GITHUB_TOKEN to authenticate the clone/push
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticate using the token in the URL
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-git
          cd wiki-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Wiki Files
        run: |
          # Copy all markdown files from docs/wiki to the wiki repository
          cp docs/wiki/*.md wiki-git/
          
          cd wiki-git
          
          # Stage everything so git status/diff recognizes new files too
          git add .
          
          # Check if there are actual staged changes to commit
          if git diff --cached --quiet; then
            echo "No changes detected in wiki files."
            exit 0
          fi
          
          # Commit and push changes
          git commit -m "docs: sync wiki from docs/wiki [skip ci]"
          git push