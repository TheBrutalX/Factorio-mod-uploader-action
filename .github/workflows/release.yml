name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
    branches: 
      - main
    paths-ignore: 
      - '**.md'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  publish:
    runs-on: ubuntu-latest
    needs: [ tests ]
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Set up Git
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit bundle.js (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git add -f dist/
          git add package-lock.json
          git commit -m 'chore(release): Added bundle.js [skip ci]' || echo "No changes to commit"
          git push

      - name: Get version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Extract version, handling both 'v1.0.0' and '1.0.0' formats
          VERSION=${GITHUB_REF_NAME#v}
          echo "Version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release v${{ env.VERSION }}
          generate_release_notes: true

      - name: Move latest tag to newest release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git tag -d latest
          git push origin :latest
          git tag -a latest -m "Latest release: v${{ env.VERSION }}"
          git push origin latest

      - name: Update major version tag (e.g., v2 → latest patch)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MAJOR_TAG="v${MAJOR}"
          echo "Updating $MAJOR_TAG to point at ${{ github.ref_name }}"
          git tag -f "$MAJOR_TAG" "${{ github.ref_name }}"
          git push origin "$MAJOR_TAG" -f
