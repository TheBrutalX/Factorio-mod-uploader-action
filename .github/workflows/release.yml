name: Release

on:
  push:
    tags:
      - 'v*'
    branches: 
      - main
    paths-ignore: 
      - '**.md'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  publish:
    runs-on: ubuntu-latest
    needs: [ tests ]
    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Git
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit bundle.js
        run: |
          git add -f dist/
          git add package-lock.json
          git commit -m 'chore(release): Added bundle.js [skip ci]'
          git push

      - name: Get version from tag
        id: version
        run: |
          # Extract version without 'v' prefix (e.g., 'v1.0.0' -> '1.0.0')
          VERSION=${GITHUB_REF_NAME#v}
          echo "Version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          generate_release_notes: true

      - name: Move latest tag to newest release
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git tag -d latest
          git push origin :latest
          git tag -a latest -m "Latest release: v${{ env.VERSION }}"
          git push origin latest
